dev_dependencies:
  build_runner: ^2.15.1
  copy_with_extension_gen: ^15.0.1
  flutter_launcher_icons: ^0.14.4
  flutter_test:
    sdk: flutter
  go_router_builder: ^4.3.0
  json_serializable: ^6.14.0
  lint: ^2.8.0
  mockito: ^5.6.4
  riverpod_generator: ^4.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/bangs/
    - assets/fonts/
    - assets/icon/
    - assets/images/
    - assets/landing/
    - assets/preferences/
    - assets/legal/
    - assets/quotes/
    - assets/sites/
    - assets/small_web/
    - assets/ublock/
  fonts:
    - family: TorIcons
      fonts:
        - asset: assets/fonts/tor-icons.ttf
    - family: WebLibre
      fonts:
        - asset: assets/fonts/WebLibre.ttf

flutter_launcher_icons:
  android: "launcher_icon"
  image_path: "assets/icon/icon.png"
  adaptive_icon_foreground: "assets/icon/icon.png"
  adaptive_icon_monochrome: "assets/icon/icon.png"
  adaptive_icon_foreground_inset: 25
  adaptive_icon_background: "#FF000000"
